<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Hover Effect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .menu__icon::before {
            content: "\f102"; /* Mã Unicode của icon ban đầu */
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            font-size: 40px;
            display: inline-block;
            transition: transform 0.3s ease-in-out, content 0.3s ease-in-out;
            position: relative;
        }

        .menu__icon:hover::before {
            content: "\f103"; /* Mã Unicode của icon thay thế */
            transform: translateY(-10px); /* Di chuyển icon lên trên */
        }
    </style>
</head>
<body>
    <div class="menu__icon">
        <!-- Biểu tượng sẽ thay đổi khi hover -->
    </div>
</body>
</html>
